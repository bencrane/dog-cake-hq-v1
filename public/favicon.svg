<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Solid Background Match -->
  <rect width="100" height="100" rx="24" fill="#1C1412" />
  
  <!-- Floppy Ears (Terracotta) -->
  <ellipse cx="26" cy="45" rx="14" ry="28" fill="#C85A32" transform="rotate(15 26 45)" />
  <ellipse cx="74" cy="45" rx="14" ry="28" fill="#C85A32" transform="rotate(-15 74 45)" />

  <!-- Main Head (Bone White) -->
  <circle cx="50" cy="55" r="28" fill="#F7F5F0" />
  <ellipse cx="50" cy="65" rx="32" ry="20" fill="#F7F5F0" />

  <!-- Eyes (Espresso) -->
  <circle cx="38" cy="50" r="5" fill="#1C1412" />
  <circle cx="62" cy="50" r="5" fill="#1C1412" />

  <!-- Nose (Espresso) -->
